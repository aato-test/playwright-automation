name: Playwright Regression Testing
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Codebase Artifacts
      uses: actions/checkout@v4

    - name: Initialize Stable Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-playwright pytest-html
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install System-Level Browser Binaries
      run: npx playwright install --with-deps

    - name: Execute Automated Regression Suites
      run: pytest

    - name: Store HTML Test Reports on Failure
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-test-execution-report
        path: report.html
        retention-days: 14